{% extends "_layout.html" %}

{% block title %}Languages{% endblock %}

{% block content %}

<div class="container mt-4">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <div>
      <h1 class="h3 mb-0">{{ user.login }}</h1>
      <p class="text-muted mb-0">Your GitHub languages</p>
    </div>

    <button class="btn btn-primary" onclick="loadLanguages(true)">
      Load languages
    </button>
  </div>

  <div id="status" class="mb-3 fw-semibold text-secondary"></div>

  <div id="value" class="row g-3"></div>

  <div id="value" class="row g-3">

  <div id="empty-state" class="text-center text-muted mt-5">
    <h5>No language data loaded yet</h5>
  </div>

</div>

</div>

{% endblock %}
