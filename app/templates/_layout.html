<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}GitHub Analyzer{% endblock %}</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    {% if session.get("github_token") %}
    <nav class="navbar navbar-dark bg-dark mb-4">
      <div class="container">
        <a class="navbar-brand" href="/">GitHub Analyzer</a>
        <a class="btn btn-outline-light btn-sm" href="/logoff">Logoff</a>
      </div>
    </nav>
    {% endif %}

    <main class="container">
        {% block content %}
        {% endblock %}
    </main>
  </body>
</html>
