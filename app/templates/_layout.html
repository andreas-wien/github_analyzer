<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}GitHub Analyzer{% endblock %}</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light d-flex flex-column min-vh-100">
    {% if session.get("github_token") %}
    <nav class="navbar navbar-dark bg-dark mb-4">
      <div class="container">
        <a class="navbar-brand" href="/">GitHub Analyzer</a>
        <a class="btn btn-outline-light btn-sm" href="/logoff">Logoff</a>
      </div>
    </nav>
    {% endif %}

    <main class="container flex-grow-1">
        {% block content %}
        {% endblock %}
        {% if show_back_button %}
          <div class="my-4">
            <a href="{{ request.referrer or '/dashboard' }}" class="btn btn-outline-secondary mb-3">
              <i class="bi bi-arrow-left"></i> Back
            </a>
          </div>
        {% endif %}
    </main>
    <footer class="bg-dark text-light py-3 mt-auto">
      <div class="container d-flex justify-content-between align-items-center">
        <span>© 2026 Andreas Prager · MIT License</span>
        <a 
          href="https://github.com/andreas-wien/github_analyzer"
          target="_blank"
          rel="noopener noreferrer"
          class="text-light text-decoration-none"
        >
          <i class="bi bi-github"></i> View on GitHub
        </a>
      </div>
    </footer>
  </body>
</html>
