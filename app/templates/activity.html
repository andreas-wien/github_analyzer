{% extends "_layout.html" %}

{% block title %}Activity{% endblock %}

{% block content %}

<div class="mb-4">
  <h1 class="h3">{{ user.login }}</h1>
  <p class="text-muted">Your GitHub activity</p>
  <div class="timeline">
    {% for event in events %}
      <div class="timeline-item">
        <div class="timeline-dot {{ event.type }}"></div>

        <div class="timeline-content">
          <div class="small text-muted">
            {{ event.date }}
          </div>

          <div>
            <i class="bi {{ event.icon }}"></i>
            <a href="{{ event.url }}" target="_blank" rel="noopener">
              {{ event.text }}
            </a>
          </div>
        </div>
      </div>
    {% endfor %}
  </div>
</div>

{% endblock %}
